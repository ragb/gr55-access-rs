name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install ALSA dev headers (midir backend)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-features

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install ALSA dev headers
        # Required because the `gr55 schema` invocation below depends on
        # the `gr55` binary, which links midir → alsa-sys on Linux.
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: wasm-pack build (web target)
        run: wasm-pack build --target web --release gr55-wasm
      - name: wasm-pack build (bundler target)
        run: wasm-pack build --target bundler --release --out-dir pkg-bundler gr55-wasm
      - name: wasm-pack build (nodejs target)
        run: wasm-pack build --target nodejs --release --out-dir pkg-node gr55-wasm
      - name: Emit JSON Schema artifact
        run: |
          cargo run -p gr55 --release -- schema --of patch -o gr55-wasm/pkg/patch.schema.json
          cargo run -p gr55 --release -- schema --of system -o gr55-wasm/pkg/system.schema.json
          cp gr55-wasm/pkg/*.schema.json gr55-wasm/pkg-bundler/
          cp gr55-wasm/pkg/*.schema.json gr55-wasm/pkg-node/
      - name: Tarball each target
        run: |
          ( cd gr55-wasm && tar czf ../gr55-wasm-web.tar.gz pkg )
          ( cd gr55-wasm && tar czf ../gr55-wasm-bundler.tar.gz pkg-bundler )
          ( cd gr55-wasm && tar czf ../gr55-wasm-node.tar.gz pkg-node )
      # Workflow-scoped artifacts — available to other jobs in this run and
      # to anyone running `gh run download` against this workflow.
      - name: Upload pkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gr55-wasm-pkgs
          path: |
            gr55-wasm-web.tar.gz
            gr55-wasm-bundler.tar.gz
            gr55-wasm-node.tar.gz
            gr55-wasm/pkg/patch.schema.json
            gr55-wasm/pkg/system.schema.json
      # Release-scoped artifacts — published only on version tags so
      # external CI pipelines can curl them at a stable URL like
      # `https://github.com/<owner>/<repo>/releases/download/v0.1.0/gr55-wasm-web.tar.gz`.
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gr55-wasm-web.tar.gz
            gr55-wasm-bundler.tar.gz
            gr55-wasm-node.tar.gz
            gr55-wasm/pkg/patch.schema.json
            gr55-wasm/pkg/system.schema.json
          fail_on_unmatched_files: true
          generate_release_notes: true
